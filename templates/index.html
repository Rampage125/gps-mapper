<style>
  :root {
    --bg: #060806;
    --surface: #0d0f0d;
    --border: #1a2a1a;
    --accent: #c3ff49;
    --accent2: #3d5aff;
    --accent3: #c849ff;
    --text: #d8f0d0;
    --muted: #4a6a4a;
    --danger: #ff3355;
    --warn: #3d5aff;
    --scan: #c849ff;
    --card: #0a0f0a;
    --radius: 0px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { letter-spacing: .04em; line-height: 1.6; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'FraktionMono', monospace;
    font-weight: 700;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Digital Noise background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 10px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* Header — minimal */
  header {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    padding-top: 6px;
  }

  .subtitle {
    font-family: 'FraktionMono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Steps — Marathon HUD */
  .steps-wrap { margin-bottom: 12px; }
  .steps {
    display: flex;
    gap: 2px;
    background: #000;
  }
  .step {
    flex: 1;
    padding: 8px 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface);
    border-top: 2px solid transparent;
    transition: all .2s;
  }
  .step.active {
    color: var(--accent);
    background: rgba(195,255,73,.06);
    border-top-color: var(--accent);
  }
  .step.done {
    color: rgba(195,255,73,.5);
    border-top-color: rgba(195,255,73,.3);
  }
  .step-num {
    width: 18px; height: 18px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'FraktionMono', monospace;
    font-size: 10px;
    flex-shrink: 0;
    transition: all .2s;
  }
  .step.active .step-num { background: var(--accent); color: #000; }
  .step.done .step-num { background: rgba(195,255,73,.2); color: var(--accent); }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 56px 40px;
    text-align: center;
    cursor: pointer;
    transition: all .25s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .upload-zone::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,229,160,.04) 0%, transparent 70%);
    opacity: 0;
    transition: opacity .3s;
  }

  .upload-zone:hover,
  .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(0,229,160,.03);
  }

  .upload-zone:hover::before,
  .upload-zone.drag-over::before {
    opacity: 1;
  }

  .upload-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
    filter: grayscale(0.3);
  }

  .upload-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .upload-hint {
    font-family: 'FraktionMono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  #file-input { display: none; }

  /* File list */
  .file-list {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .file-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    animation: slideIn .2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .file-icon { font-size: 18px; flex-shrink: 0; }

  .file-name {
    flex: 1;
    font-family: 'FraktionMono', monospace;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .file-size {
    font-family: 'FraktionMono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .file-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .2s;
  }
  .file-remove:hover { color: var(--danger); }

  /* Process button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    border: none;
    border-radius: 8px;
    font-family: 'Shapiro65Wide', sans-serif;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    width: 100%;
    justify-content: center;
    margin-top: 20px;
    font-size: 19px;
    font-family: 'Shapiro65Wide', sans-serif;
    text-transform: uppercase;
  }

  .btn-primary:hover:not(:disabled):not(.no-hover) {
    background: #00ffb3;
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(0,229,160,.25);
  }

  /* На тач-устройствах убираем застрявший hover через класс */
  @media (hover: none) {
    .btn-primary:hover:not(:disabled) {
      background: var(--accent);
      transform: none;
      box-shadow: none;
    }
    .btn-primary:active:not(:disabled) {
      background: #00ffb3;
      transform: translateY(-1px);
    }
  }

  .btn-primary:disabled {
    opacity: .35;
    cursor: not-allowed;
  }

  .btn-secondary {
    background: var(--accent2);
    color: #fff;
  }

  .btn-secondary:hover {
    background: #9380ff;
    transform: translateY(-1px);
  }

  /* Progress */
  .progress-wrap {
    margin-top: 20px;
    display: none;
  }

  .progress-wrap.visible { display: block; }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width .4s ease;
    width: 0%;
  }

  .progress-fill.indeterminate {
    width: 40%;
    animation: indeterminate 1.4s infinite;
  }

  @keyframes indeterminate {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  .progress-text {
    font-family: 'FraktionMono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Results panel */
  .results-panel {
    margin-top: 32px;
    display: none;
  }

  .results-panel.visible { display: block; }

  .panel-title {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    font-family: 'FraktionMono', monospace;
  }

  /* Spoiler toggle */
  .spoiler-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: none;
    border: none;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 10px 4px;
    color: var(--muted);
    font-family: 'FraktionMono', monospace;
    font-size: 12px;
    letter-spacing: .15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color .2s;
  }
  .spoiler-toggle:hover { color: var(--text); }
  #spoiler-arrow { font-size: 9px; transition: transform .2s; display: inline-block; }
  .spoiler-toggle.open #spoiler-arrow { transform: rotate(90deg); }
  #spoiler-body { margin-top: 12px; }

  .result-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--muted);
    border-radius: 0;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: start;
    animation: slideIn .2s ease;
  }

  .result-row.ok { border-left: 3px solid var(--accent); }
  .result-row.fail { border-left: 3px solid var(--danger); }
  .result-row.manual { border-left: 3px solid var(--warn); }

  .result-name {
    font-family: 'FraktionMono', monospace;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .result-coords {
    font-family: 'FraktionMono', monospace;
    font-size: 11px;
    color: var(--accent);
  }

  .result-coords.none { color: var(--danger); }

  .result-raw {
    font-family: 'FraktionMono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 60px;
    overflow: hidden;
    cursor: pointer;
  }

  .result-raw.expanded { max-height: none; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: 'FraktionMono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
    flex-shrink: 0;
  }

  .badge-ok  { background: rgba(0,229,160,.15); color: var(--accent); }
  .badge-fail { background: rgba(255,68,102,.15); color: var(--danger); }
  .badge-warn { background: rgba(255,179,64,.15); color: var(--warn); }

  /* Manual coords input */
  .manual-input {
    display: none;
    margin-top: 8px;
    gap: 8px;
    flex-wrap: wrap;
  }

  .manual-input.visible { display: flex; }

  .inp {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-family: 'FraktionMono', monospace;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
    width: 130px;
  }

  .inp:focus { border-color: var(--accent); }
  .inp::placeholder { color: var(--muted); }

  .inp-name {
    width: 200px;
  }

  .btn-tiny {
    padding: 7px 12px;
    border-radius: 6px;
    border: none;
    font-family: 'FraktionMono', monospace;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-save { background: var(--accent); color: #000; }
  .btn-save:hover { background: #00ffb3; }
  .btn-skip { background: var(--border); color: var(--muted); }
  .btn-skip:hover { background: #2a2a3a; color: var(--text); }

  /* Stats bar */
  .stats-bar-wrap {
    margin-bottom: 0;
  }
  .stats-bar {
    display: flex;
    gap: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 32px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .stat-val {
    font-size: 30px;
    font-weight: 800;
    line-height: 1;
  }

  .stat-val.green { color: var(--accent); }
  .stat-val.red   { color: var(--danger); }
  .stat-val.yellow{ color: var(--warn); }

  .stat-label {
    font-family: 'FraktionMono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Map section */
  .map-section {
    margin-top: 32px;
    display: none;
  }

  .map-section.visible { display: block; }

  .map-section iframe {
    width: 100%;
    height: 580px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
  }

  .map-actions {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 32px 0;
  }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--danger);
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'FraktionMono', monospace;
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s;
    z-index: 9999;
    max-width: 320px;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: "Syne", sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn.active {
    background: var(--accent);
    color: #000;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Links textarea */
  .links-textarea {
    width: 100%;
    min-height: 160px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    color: var(--text);
    font-family: "Space Mono", monospace;
    font-size: 12px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: border-color .2s;
  }
  .links-textarea:focus { border-color: var(--accent); }
  .links-textarea::placeholder { color: var(--muted); }

  /* ── Link tracker — no borders, compact ── */
  .link-tracker {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin: 16px 0 0;
  }
  .link-track-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 2px;
    font-family: "Space Mono", monospace;
    font-size: 11px;
    color: var(--muted);
    transition: color .3s;
    border: none;
    background: transparent;
  }
  .link-track-row.downloading { color: var(--accent2); }
  .link-track-row.scanning    { color: var(--scan); }
  .link-track-row.done-ok     { color: var(--accent); }
  .link-track-row.done-fail   { color: var(--danger); }

  .track-icon {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .track-icon svg { width: 14px; height: 14px; }

  /* waiting dots animation */
  .dots-anim span {
    display: inline-block;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: currentColor;
    margin: 0 1px;
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .dots-anim span:nth-child(2) { animation-delay: .2s; }
  .dots-anim span:nth-child(3) { animation-delay: .4s; }
  @keyframes dotBounce {
    0%,80%,100% { transform: scale(0.6); opacity: .4; }
    40%          { transform: scale(1);   opacity: 1; }
  }

  /* download arrow bounce */
  .dl-anim { animation: dlBounce 0.8s ease-in-out infinite; }
  @keyframes dlBounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(3px); }
  }

  /* scan line animation */
  .scan-anim { animation: scanPulse 1s ease-in-out infinite; }
  @keyframes scanPulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  .track-name { flex: 1; }
  .track-coords { font-size: 10px; opacity: .75; flex-shrink: 0; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="subtitle">PHOTO // OCR // INTERACTIVE MAP</div>
  </header>

  <!-- Steps indicator -->
  <div class="steps-wrap">
  <div class="steps" id="steps">
    <div class="step active" id="step1">
      <div class="step-num">1</div>
      <span>Input</span>
    </div>
    <div class="step" id="step2">
      <div class="step-num">2</div>
      <span>Process OCR</span>
    </div>
    <div class="step" id="step3">
      <div class="step-num">3</div>
      <span>Review Points</span>
    </div>
    <div class="step" id="step4">
      <div class="step-num">4</div>
      <span>View Map</span>
    </div>
  </div>
  </div><!-- /steps-wrap -->

  <!-- Links input only -->
  <textarea class="links-textarea" id="links-input"
    placeholder="Вставьте ссылки — по одной на строку или с нумерацией:&#10;1. https://ibb.co/abc123&#10;2. https://ibb.co/xyz456&#10;https://ibb.co/..."></textarea>
  <button class="btn btn-primary" id="links-btn" onclick="processLinks()" ontouchend="setTimeout(()=>this.blur(),1500)" style="margin-top:12px">
    Scan Coordinates
  </button>
  <div class="link-tracker" id="link-tracker" style="display:none"></div>

  <!-- Progress bar (hidden, used by photo upload flow) -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar"><div class="progress-fill indeterminate" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text">SCANNING…</div>
  </div>

  <!-- Results -->
  <div class="results-panel" id="results-panel">
    <div class="divider"></div>

    <div class="stats-bar" id="stats-bar"></div>

    <!-- Spoiler toggle -->
    <button class="spoiler-toggle" id="spoiler-toggle" onclick="toggleSpoiler()">
      <span id="spoiler-arrow">▶</span>
      <span id="spoiler-label">// RECOGNIZED POINTS</span>
      <span id="spoiler-count" style="margin-left:auto;color:var(--accent);font-size:11px"></span>
    </button>
    <div id="spoiler-body" style="display:none">
      <div id="result-rows"></div>
    </div>

    <button class="btn btn-primary" id="build-btn" onclick="buildMap()" style="margin-top:24px;display:none">
      Generate Map
    </button>
  </div>

  <!-- Map -->
  <div class="map-section" id="map-section" style="position:relative">

    <!-- Map spoiler toggle (только iframe внутри) -->
    <button class="spoiler-toggle" id="map-spoiler-toggle" onclick="toggleMapSpoiler()">
      <span id="map-spoiler-arrow">▶</span>
      <span>// INTERACTIVE MAP</span>
      <span style="margin-left:auto;color:var(--accent);font-size:11px;letter-spacing:.1em">[TAP TO OPEN]</span>
    </button>

    <div id="map-spoiler-body" style="display:none">
      <iframe id="map-frame" src="" frameborder="0" style="margin-top:12px"></iframe>
    </div>

    <!-- Кнопки всегда снаружи спойлера -->
    <div class="map-actions">
      <a id="map-link" href="#" target="_blank" class="btn btn-secondary">↗ OPEN IN NEW TAB</a>
      <button id="share-btn" class="btn" onclick="shareMap()" style="background:var(--scan);color:#fff;clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px))">⬆ SHARE LINK</button>
      <a id="map-download" href="#" download="gps_map.html" class="btn" style="display:none;background:var(--border);color:var(--text);clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px))">⬇ DOWNLOAD</a>
    </div>
    <div id="share-result" style="display:none;margin-top:12px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--scan);padding:12px 14px;">
      <div style="font-size:10px;color:var(--muted);letter-spacing:.15em;margin-bottom:6px;">// SHARE LINK</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <a id="share-url" href="#" target="_blank" style="color:var(--scan);font-size:13px;word-break:break-all;flex:1;text-decoration:none;border-bottom:1px solid rgba(200,73,255,.3);"></a>
        <button onclick="copyShareLink()" style="background:none;border:1px solid var(--scan);color:var(--scan);padding:4px 10px;font-family:inherit;font-size:10px;cursor:pointer;letter-spacing:.1em;">COPY</button>
      </div>
    </div>
  </div>

</div>

<canvas id="bg-noise-canvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>
<div class="toast" id="toast"></div>

<script>
  let selectedFiles = [];
  let ocrResults = [];
  let pointsData = [];   // confirmed points
  let currentMapId = null;

  // ── Drag & drop ── (guard in case upload zone removed)
  const zone = document.getElementById('upload-zone');
  const fileInput = document.getElementById('file-input');

  if (zone && fileInput) {
    zone.addEventListener('click', () => fileInput.click());
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      addFiles(Array.from(e.dataTransfer.files));
    });
    fileInput.addEventListener('change', () => {
      addFiles(Array.from(fileInput.files));
      fileInput.value = '';
    });
  }

  function addFiles(files) {
    files.forEach(f => {
      if (!selectedFiles.find(x => x.name === f.name && x.size === f.size)) {
        selectedFiles.push(f);
      }
    });
    renderFileList();
  }

  function removeFile(idx) {
    selectedFiles.splice(idx, 1);
    renderFileList();
  }

  function formatSize(b) {
    if (b > 1048576) return (b/1048576).toFixed(1) + ' MB';
    return (b/1024).toFixed(0) + ' KB';
  }

  function renderFileList() {
    const list = document.getElementById('file-list');
    list.innerHTML = '';
    selectedFiles.forEach((f, i) => {
      list.innerHTML += `
        <div class="file-item">
          <span class="file-icon">🖼️</span>
          <span class="file-name">${f.name}</span>
          <span class="file-size">${formatSize(f.size)}</span>
          <button class="file-remove" onclick="removeFile(${i})" title="Remove">✕</button>
        </div>`;
    });
    document.getElementById('process-btn').disabled = selectedFiles.length === 0;
    setStep(selectedFiles.length > 0 ? 1 : 0);
  }

  // ── Steps ──
  function setStep(n) {
    for (let i = 1; i <= 4; i++) {
      const el = document.getElementById(`step${i}`);
      el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
    }
  }

  function handleLinksKey(e) {
    // Ctrl+Enter or just blur — auto process if has links
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      processLinks();
    }
  }



  // ── Process ──
  async function processFiles() {
    if (!selectedFiles.length) return;

    document.getElementById('process-btn').disabled = true;
    document.getElementById('results-panel').classList.remove('visible');
    document.getElementById('map-section').classList.remove('visible');

    showProgress('ЗАГРУЗКА ФАЙЛОВ…');
    setStep(2);

    const form = new FormData();
    selectedFiles.forEach(f => form.append('photos', f));

    let response;
    try {
      response = await fetch('/api/process', { method: 'POST', body: form });
      if (!response.ok) throw new Error('Server error ' + response.status);
    } catch (e) {
      hideProgress();
      showToast('Error: ' + e.message);
      document.getElementById('process-btn').disabled = false;
      setStep(1);
      return;
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop();

      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        try {
          const msg = JSON.parse(line.slice(5).trim());
          if (msg.type === 'status') {
            document.getElementById('progress-text').textContent =
              `🔍 Сканирую ${msg.i}/${msg.total} — ${msg.name}`;
          }
          if (msg.type === 'done') {
            ocrResults = msg.results;
            hideProgress();
            renderResults(ocrResults);
            setStep(3);
            document.getElementById('process-btn').disabled = false;
            setTimeout(() => {
              const target = document.getElementById('build-btn');
              if (!target) return;
              const rect = target.getBoundingClientRect();
              const absTop = rect.top + (window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop);
              const scrollTo = Math.max(0, absTop - window.innerHeight / 2 + rect.height / 2);
              try {
                window.scroll({ top: scrollTo, behavior: 'smooth' });
                document.documentElement.scrollTop = scrollTo;
                document.body.scrollTop = scrollTo;
              } catch(e) {
                document.documentElement.scrollTop = scrollTo;
                document.body.scrollTop = scrollTo;
              }
            }, 600);
          }
        } catch(e) {}
      }
    }
  }

  // ── Render OCR results ──
  function renderResults(results) {
    const container = document.getElementById('result-rows');
    container.innerHTML = '';
    pointsData = [];

    let okCount = 0, failCount = 0;

    results.forEach((r, idx) => {
      if (r.ok) {
        okCount++;
        pointsData.push({ lat: r.coords[0], lon: r.coords[1], name: r.name, idx });
      } else {
        failCount++;
      }

      const status = r.ok ? 'ok' : 'fail';
      const badge = r.ok
        ? `<span class="badge badge-ok">✓ OCR OK</span>`
        : `<span class="badge badge-fail">✗ No coords</span>`;

      const coordText = r.ok
        ? `${r.coords[0].toFixed(6)}, ${r.coords[1].toFixed(6)}`
        : 'Not found';

      container.innerHTML += `
        <div class="result-row ${status}" id="row-${idx}">
          <div>
            <div class="result-name"><a href="${r.link || '#'}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px solid var(--muted);" onmouseover="this.style.borderBottomColor='var(--accent)'" onmouseout="this.style.borderBottomColor='var(--muted)'">${r.name}</a></div>
            <div class="result-coords ${r.ok ? '' : 'none'}" id="coords-display-${idx}">${coordText}</div>
            <div class="result-raw" id="raw-${idx}" title="Click to expand" onclick="this.classList.toggle('expanded')">${r.raw || '(empty OCR)'}</div>
            <div class="manual-input ${r.ok ? '' : 'visible'}" id="manual-${idx}">
              <input class="inp" id="mlat-${idx}" placeholder="Latitude" type="number" step="any">
              <input class="inp" id="mlon-${idx}" placeholder="Longitude" type="number" step="any">
              <input class="inp inp-name" id="mname-${idx}" placeholder="Name" value="${r.name.replace('.jpg','')}">
              <button class="btn-tiny btn-save" onclick="saveManual(${idx})">Save</button>
              <button class="btn-tiny btn-skip" onclick="skipPoint(${idx})">Skip</button>
            </div>
          </div>
          ${badge}
          <button class="btn-tiny btn-skip" onclick="toggleManual(${idx})" style="font-size:10px">Edit</button>
        </div>`;
    });

    // Stats
    const statsBar = document.getElementById('stats-bar');
    statsBar.innerHTML = `
      <div class="stat"><div class="stat-val green">${okCount}</div><div class="stat-label">Recognized</div></div>
      <div class="stat"><div class="stat-val red">${failCount}</div><div class="stat-label">Failed</div></div>
      <div class="stat"><div class="stat-val">${results.length}</div><div class="stat-label">Total</div></div>
    `;

    document.getElementById('results-panel').classList.add('visible');

    // Reset spoiler — collapsed by default
    const spoilerBody = document.getElementById('spoiler-body');
    const spoilerToggle = document.getElementById('spoiler-toggle');
    spoilerBody.style.display = 'none';
    spoilerToggle.classList.remove('open');
    document.getElementById('spoiler-count').textContent = `${okCount}/${results.length}`;

    const buildBtn = document.getElementById('build-btn');
    buildBtn.style.display = pointsData.length >= 1 ? '' : 'none';
    buildBtn.textContent = '';
    buildBtn.innerHTML = `Generate Map (${pointsData.length} points)`;
  }

  function toggleManual(idx) {
    document.getElementById(`manual-${idx}`).classList.toggle('visible');
  }

  function saveManual(idx) {
    const lat = parseFloat(document.getElementById(`mlat-${idx}`).value);
    const lon = parseFloat(document.getElementById(`mlon-${idx}`).value);
    const name = document.getElementById(`mname-${idx}`).value.trim() || ocrResults[idx].name;

    if (isNaN(lat) || isNaN(lon)) { showToast('Enter valid coordinates'); return; }
    if (lat < -90 || lat > 90 || lon < -180 || lon > 180) { showToast('Coordinates out of range'); return; }

    // Update or add
    const existing = pointsData.findIndex(p => p.idx === idx);
    if (existing >= 0) pointsData[existing] = { lat, lon, name, idx };
    else pointsData.push({ lat, lon, name, idx });

    // Update UI
    document.getElementById(`coords-display-${idx}`).textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
    document.getElementById(`coords-display-${idx}`).classList.remove('none');
    const row = document.getElementById(`row-${idx}`);
    row.classList.remove('fail');
    row.classList.add('manual');
    document.getElementById(`manual-${idx}`).classList.remove('visible');

    const buildBtn = document.getElementById('build-btn');
    buildBtn.style.display = '';
    buildBtn.innerHTML = `Generate Map (${pointsData.length} points)`;
  }

  function skipPoint(idx) {
    const i = pointsData.findIndex(p => p.idx === idx);
    if (i >= 0) pointsData.splice(i, 1);
    document.getElementById(`manual-${idx}`).classList.remove('visible');
    document.getElementById(`row-${idx}`).style.opacity = '.35';

    const buildBtn = document.getElementById('build-btn');
    if (pointsData.length === 0) buildBtn.style.display = 'none';
    else buildBtn.innerHTML = `Generate Map (${pointsData.length} points)`;
  }

  // ── Build map ──
  async function buildMap() {
    if (!pointsData.length) { showToast('No points to map'); return; }

    document.getElementById('build-btn').disabled = true;
    showProgress('GENERATING MAP…');
    setStep(4);

    try {
      const res = await fetch('/api/build_map', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ points: pointsData })
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      const data = await res.json();
      hideProgress();
      showMap(data.map_id);
    } catch (e) {
      hideProgress();
      showToast('Error: ' + e.message);
      document.getElementById('build-btn').disabled = false;
    }
  }

  function showMap(mapId) {
    currentMapId = mapId;
    const url = `/map/${mapId}`;
    document.getElementById('map-frame').src = url;
    document.getElementById('map-link').href = url;
    document.getElementById('map-download').href = url;
    document.getElementById('share-btn').disabled = false;
    document.getElementById('share-btn').textContent = '⬆ SHARE LINK';
    document.getElementById('share-result').style.display = 'none';
    // Показать секцию, но споilер свёрнут
    document.getElementById('map-spoiler-body').style.display = 'none';
    document.getElementById('map-spoiler-toggle').classList.remove('open');
    document.getElementById('map-spoiler-arrow').style.transform = '';
    document.getElementById('map-section').classList.add('visible');
    document.getElementById('build-btn').style.display = 'none';
    document.getElementById('map-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function toggleMapSpoiler() {
    const body   = document.getElementById('map-spoiler-body');
    const arrow  = document.getElementById('map-spoiler-arrow');
    const toggle = document.getElementById('map-spoiler-toggle');
    const open   = body.style.display === 'none';
    body.style.display  = open ? 'block' : 'none';
    arrow.style.transform = open ? 'rotate(90deg)' : '';
    toggle.classList.toggle('open', open);
  }

  // ── Helpers ──
  function showProgress(text) {
    document.getElementById('progress-text').textContent = text;
    document.getElementById('progress-wrap').classList.add('visible');
  }

  function toggleSpoiler() {
    const body = document.getElementById('spoiler-body');
    const toggle = document.getElementById('spoiler-toggle');
    const open = body.style.display === 'none';
    body.style.display = open ? 'block' : 'none';
    toggle.classList.toggle('open', open);
  }

  function hideProgress() {
    document.getElementById('progress-wrap').classList.remove('visible');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  // tabs removed — links only mode

  // ── Per-link tracker ──
  const trackState = {}; // name → {el, step}

  function makeIcon(type) {
    if (type === 'wait') return `<svg viewBox="0 0 24 8" width="24" height="8">
      <circle cx="4" cy="4" r="2.5" fill="currentColor">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2;3;2" dur="1.2s" begin="0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="12" cy="4" r="2.5" fill="currentColor">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2;3;2" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="20" cy="4" r="2.5" fill="currentColor">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2;3;2" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
    </svg>`;

    if (type === 'download') return `<svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <line x1="8" y1="1" x2="8" y2="9">
        <animate attributeName="y1" values="1;3;1" dur="0.9s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="9;11;9" dur="0.9s" repeatCount="indefinite"/>
      </line>
      <polyline points="4.5,6.5 8,10.5 11.5,6.5">
        <animate attributeName="points" values="4.5,6.5 8,10.5 11.5,6.5;4.5,8.5 8,12.5 11.5,8.5;4.5,6.5 8,10.5 11.5,6.5" dur="0.9s" repeatCount="indefinite"/>
      </polyline>
      <line x1="2" y1="14" x2="14" y2="14"/>
    </svg>`;

    if (type === 'scan') return `<svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
      <path d="M2,4 L2,2 L4,2"/>
      <path d="M12,2 L14,2 L14,4"/>
      <path d="M14,12 L14,14 L12,14"/>
      <path d="M4,14 L2,14 L2,12"/>
      <line x1="2" y1="8" x2="14" y2="8" stroke-width="1.4">
        <animate attributeName="y1" values="3;13;3" dur="1.4s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="3;13;3" dur="1.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.4;1" dur="1.4s" repeatCount="indefinite"/>
      </line>
    </svg>`;

    if (type === 'ok') return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" width="14" height="14"><polyline points="2.5,8 6.5,12 13.5,4"/></svg>`;
    return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" width="14" height="14"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>`;
  }

  function initTracker(links) {
    const tracker = document.getElementById('link-tracker');
    tracker.innerHTML = '';
    tracker.style.display = 'flex';
    Object.keys(trackState).forEach(k => delete trackState[k]);

    links.forEach((link, i) => {
      const short = link.replace(/^https?:\/\//, '').slice(0, 44);
      const row = document.createElement('div');
      row.className = 'link-track-row';
      row.id = `track-${i+1}`;
      row.innerHTML = `<span class="track-icon">${makeIcon('wait')}</span><span class="track-name">${short}</span><span class="track-coords" id="track-coords-${i+1}"></span>`;
      tracker.appendChild(row);
    });
  }

  function updateTracker(i, step, coords) {
    const row = document.getElementById(`track-${i}`);
    if (!row) return;
    const icon = row.querySelector('.track-icon');
    const coordEl = document.getElementById(`track-coords-${i}`);

    if (step === 'download') {
      row.className = 'link-track-row downloading';
      icon.innerHTML = makeIcon('download');
    } else if (step === 'ocr') {
      row.className = 'link-track-row scanning';
      icon.innerHTML = makeIcon('scan');
    } else if (step === 'done-ok') {
      row.className = 'link-track-row done-ok';
      icon.innerHTML = makeIcon('ok');
      if (coords) coordEl.textContent = coords[0].toFixed(4) + ', ' + coords[1].toFixed(4);
    } else if (step === 'done-fail') {
      row.className = 'link-track-row done-fail';
      icon.innerHTML = makeIcon('fail');
    }
  }

  let linksProcessing = false;

  // ── Process links (SSE streaming) ──
  async function processLinks() {
    console.log('[processLinks] called, linksProcessing=', linksProcessing);
    if (linksProcessing) {
      console.log('[processLinks] blocked by linksProcessing flag');
      return;
    }
    const text = document.getElementById('links-input').value.trim();
    if (!text) { console.log('[processLinks] empty text'); return; }

    // Extract all URLs from anywhere in the text
    const rawLinks = [...new Set(
      (text.match(/https?:\/\/\S+/g) || [])
        .map(u => u.replace(/[.,;!?)\]>"']+$/, ''))
    )];
    console.log('[processLinks] rawLinks:', rawLinks);
    if (!rawLinks.length) { showToast('Ссылки не найдены'); return; }

    linksProcessing = true;
    setTimeout(() => document.getElementById('links-btn').blur(), 1500);
    document.getElementById('results-panel').classList.remove('visible');
    document.getElementById('map-section').classList.remove('visible');
    initTracker(rawLinks);
    setStep(2);

    try {
      const response = await fetch('/api/process_links', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      console.log('[processLinks] response status:', response.status);
      if (!response.ok) throw new Error('Server error ' + response.status);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      const partialResults = new Array(rawLinks.length);  // накапливаем на случай обрыва

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();

        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith('data:')) continue;
          try {
            const msg = JSON.parse(line.slice(5).trim());
            if (msg.type === 'status') {
              updateTracker(msg.i, msg.step);
            } else if (msg.type === 'result') {
              const idx = msg.entry.idx || null;
              if (idx !== null) {
                updateTracker(idx, msg.entry.ok ? 'done-ok' : 'done-fail', msg.entry.coords);
                // Накапливаем результаты на клиенте на случай обрыва стрима
                partialResults[idx - 1] = msg.entry;
              }
            } else if (msg.type === 'retry_start') {
              console.log(`[processLinks] retry attempt ${msg.attempt}, links: ${msg.count}`);
            } else if (msg.type === 'done') {
              ocrResults = msg.results;
              hideProgress();
              renderResults(ocrResults);
              setStep(3);
            }
          } catch(e) {}
        }
      }
      // Стрим закрылся — если done не пришёл, показываем частичные результаты
      const collected = partialResults.filter(Boolean);
      if (ocrResults.length === 0 && collected.length > 0) {
        ocrResults = collected;
        hideProgress();
        renderResults(ocrResults);
        setStep(3);
        showToast(`Соединение прервано. Показано ${collected.length} результатов.`);
      }
    } catch (e) {
      console.error('[processLinks error]', e);
      // Показываем частичные результаты если есть
      const collected = partialResults.filter(Boolean);
      if (collected.length > 0) {
        ocrResults = collected;
        hideProgress();
        renderResults(ocrResults);
        setStep(3);
        showToast(`Ошибка: ${e.message}. Показано ${collected.length} результатов.`);
      } else {
        showToast('Ошибка: ' + e.message);
        setStep(1);
      }
    } finally {
      linksProcessing = false;
    }
  }

  // ── Share map via pagedrop.io (proxied through Flask) ──
  async function shareMap() {
    const btn = document.getElementById('share-btn');
    const resultBox = document.getElementById('share-result');
    const urlEl = document.getElementById('share-url');

    if (!currentMapId) { showToast('Generate a map first'); return; }

    btn.textContent = '⬆ SHARE LINK';
    btn.disabled = true;
    resultBox.style.display = 'none';

    try {
      const resp = await fetch('/api/share', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ map_id: currentMapId })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Upload failed');

      urlEl.textContent = data.url;
      urlEl.href = data.url;
      resultBox.style.display = 'block';
      btn.textContent = '✓ SHARED';

    } catch (e) {
      btn.textContent = '⬆ SHARE LINK';
      btn.disabled = false;
      showToast('Share error: ' + e.message);
    }
  }

  function copyShareLink() {
    const url = document.getElementById('share-url').textContent;
    navigator.clipboard.writeText(url).then(() => {
      showToast('Link copied!');
    }).catch(() => {
      showToast('Copy failed — select manually');
    });
  }
</script>

<script>
// Digital Noise background
(function() {
  const cv = document.getElementById('bg-noise-canvas');
  function resize() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const ctx = cv.getContext('2d');
  let burst = 0, bt = 0;
  function draw() {
    bt--;
    if (bt <= 0) { burst = Math.random() > 0.7 ? 1 : 0; bt = 18 + Math.random() * 72; }
    const W = cv.width, H = cv.height;
    const imgData = ctx.createImageData(W, H);
    const d = imgData.data;
    for (let y = 0; y < H; y++) {
      const rowBurst = Math.random() > 0.978 ? (burst ? 0.33 : 0.088) : 0;
      for (let x = 0; x < W; x++) {
        const i = (y * W + x) * 4;
        const n = Math.random();
        if (n > (burst ? 0.57 : 0.90)) {
          const intensity = (rowBurst + n * 0.165) * 255;
          const hue = Math.random();
          d[i]   = hue > 0.6 ? intensity * 0.75 : intensity * 0.1;
          d[i+1] = intensity;
          d[i+2] = hue < 0.4 ? intensity * 0.3 : intensity * 0.05;
          d[i+3] = 66 + Math.random() * 88;
        } else { d[i]=d[i+1]=d[i+2]=0; d[i+3]=0; }
      }
    }
    ctx.clearRect(0, 0, W, H);
    ctx.putImageData(imgData, 0, 0);
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
